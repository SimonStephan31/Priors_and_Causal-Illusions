// Render an image trial
function makeImageHTML(src) {
  return `
    <p><b>The picture below shows an occasion on which the device was activated. Please look carefully at the picture below and check which ball rolled on this occasion.</b></p>
    <br>
    <img src="${src}" style="width:100%; max-width:1000px; border-radius:10px;" />

// OPAQUE image sets by contingency
const imageSets = {
  "0_0":        ["C0_E0", "C1_E0"],
  "05_05":      ["C0_E0", "C1_E0", "C1_E1", "C0_E1"],
  "1_1":       ["C0_E1", "C0_E1", "C1_E1", "C1_E1"],
  "1_0":        ["C0_E0", "C1_E1"]
};

// Build n stimuli for a given contingency (n determined at runtime)
function generateImageStimuli(cont, n) {
  const base = imageSets[cont];
  const repeats = Math.ceil(n / base.length);
  const list = Array.from({ length: repeats * base.length }, (_, i) => base[i % base.length]).slice(0, n);
  return list.map(f => ({
    stimulus: makeImageHTML(`img/${f}.png`),
    file_id: f
  }));
}

// Shuffle helper
function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

var setup_learning = {
  type: jsPsychHtmlKeyboardResponse,
  stimulus: '',
  choices: "NO_KEYS",
  trial_duration: 1,
  on_start: function() {
    const n = parseInt(sampleN);
    generated_stimuli = shuffleArray(generateImageStimuli(contingency, n));
    console.log(`Learning phase setup: contingency=${contingency}, n=${n}, trials generated=${generated_stimuli.length}`);
  }
};

function buildLearningTrials() {
  const trials = [];
  for (let i = 0; i < 16; i++) {
    const trial_index = i;

    const this_fixation = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: '<div style="font-size:60px;"></div>',
      choices: "NO_KEYS",
      trial_duration: 500
    };

    const this_learning = {
      type: jsPsychSurveyMultiChoice,

      preamble: function() {
        return generated_stimuli[trial_index].stimulus;
      },

      questions: [
        {
          prompt: `On this occasion, the <b><span style="color: #FFD700;">yellow</span></b> ball...`,
          name: "yellow_choice",
          options: ["rolled", "did not roll"],
          required: true
        },
        {
          prompt: `On this occasion, the <b><span style="color: #FF69B4;">pink</span></b> ball...`,
          name: "pink_choice",
          options: ["rolled", "did not roll"],
          required: true
        }
      ],

      data: function() {
        return {
          phase: "learning",
          file_id: generated_stimuli[trial_index].file_id
        };
      },

      on_load: function () {
        const btn = document.querySelector('#jspsych-survey-multi-choice-next');
        if (demo_mode) return;
        btn.disabled = true;
        setTimeout(() => { btn.disabled = false; }, 500);
      },

      on_finish: function(data) {
        const fileID = data.file_id;
        const trueYellow = fileID[1] === "1" ? 1 : 0;
        const truePink   = fileID[4] === "1" ? 1 : 0;
        const yellowAns  = data.response.yellow_choice === "rolled" ? 1 : 0;
        const pinkAns    = data.response.pink_choice   === "rolled" ? 1 : 0;
        data.yellow_correct = (yellowAns === trueYellow) ? 1 : 0;
        data.pink_correct   = (pinkAns   === truePink)   ? 1 : 0;
        data.true_yellow = trueYellow;
        data.true_pink   = truePink;
        console.log(`Trial ${trial_index} ${fileID} → Yellow: ${yellowAns} (true ${trueYellow}), Pink: ${pinkAns} (true ${truePink})`);
      }
    };

    // Wrap fixation + learning in a conditional node together
    trials.push({
      timeline: [this_fixation, this_learning],
      conditional_function: function() {
        return trial_index < generated_stimuli.length;
      }
    });
  }
  return trials;
}

const learning_trials = buildLearningTrials();

var test_structure_posterior = {
  type: jsPsychSurveyHtmlForm,

  preamble: function() {

    // Decide which mechanism illustration to show
    let mech_img = "img/C0_E0.png";

   
    return `
      <p><b>The picture below shows the same device again, with its inside covered.</b></p>
      <p><img src="${mech_img}" width="100%"></img></p>
      <hr>
    `;
  },

  html: `
    <style>
      input[type="range"] {
        -webkit-appearance: none;
        width: 100%;
        height: 8px;
        background: #d3d3d3;
        outline: none;
        opacity: 0.7;
        transition: opacity .2s;
        border-radius: 5px;
      }

      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 20px; height: 20px;
        border-radius: 50%;
        background: #00008B;
        cursor: pointer;
        opacity: 0;
        transition: opacity 0.2s ease-in-out;
        margin-top: -6px;
      }

      input[type="range"].touched::-webkit-slider-thumb { opacity: 1; }
      input[type="range"].touched::-webkit-slider-runnable-track { background: #2196F3; }

      .slider-label {
        font-size: 0.75em;
        line-height: 1.3;
      }

      .slider-value-display {
        font-weight: bold;
        margin-top: 10px;
        display: block;
        text-align: center;
        visibility: hidden;
        opacity: 0;
        transition: opacity 0.2s ease-in-out, visibility 0.2s ease-in-out;
      }

      .slider-value-display.visible {
        visibility: visible;
        opacity: 1;
      }
    </style>

    <div style="margin-bottom: 40px;">
       <p><b>What's the probability that the present device above is one in which the rolling of the
        <span style="color:#FFD700;">yellow</span> ball can cause the rolling of the 
        <span style="color:#FF69B4;">pink</span> ball (i.e., a causal model)?</b><br>
        <i>Please use the scale below to report your confidence.</i></p>


      <input type="range" id="slider1" name="structure_rating_posterior" 
             min="0" max="100" value="50" step="1"
             style="width: 100%;" data-interacted="false">

      <div style="display: flex; justify-content: space-between; text-align: center;">
        <span class="slider-label" style="width: 10%;"><b>Certainly <u>not</u> causal</b></span>
        <span class="slider-label" style="width: 10%;"><b>Certainly causal</b></span>
      </div>

      <span id="slider1-value" class="slider-value-display"></span>
    </div>
  `,

  on_load: function() {
    const demo = (typeof demo_mode !== 'undefined' && demo_mode === true);
    const slider = document.getElementById('slider1');
    const display = document.getElementById('slider1-value');
    const button = document.querySelector('#jspsych-survey-html-form-next');

    const update = () => {
      const v = slider.value;
      display.textContent = `Selected value: ${v}%`;
    };

    const check = () => {
      button.disabled = !demo && slider.dataset.interacted !== 'true';
    };

    const activate = () => {
      slider.classList.add('touched');
      slider.dataset.interacted = 'true';
      display.classList.add('visible');
      update();
      check();
      if (!demo) {
        slider.removeEventListener('mouseup', activate);
        slider.removeEventListener('touchend', activate);
      }
    };

    // Require first click
    if (!demo) {
      slider.addEventListener('mouseup', activate);
      slider.addEventListener('touchend', activate);
    }

    // Update display continuously
    slider.addEventListener('input', () => {
      update();
      if (!demo) slider.dataset.interacted = 'true';
      check();
    });

    update();
    check();
  },

  on_finish: function(data) {
    const response = data.response.structure_rating_posterior;
    data.structure_rating_posterior = response;
    jsPsych.data.addProperties({ rating_posterior: response });
    console.log("structure rating:", response);
  }
};
